<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Discover Ethiopia</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <nav>
      <div class="logo">Discover <span>Ethiopia</span></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="destinations.html">Destinations</a>
        <a href="contact.html">Contact</a>
        <div id="authNav"></div>
      </div>
    </nav>

    <div class="page-header">
      <h1>Contact <span class="gold">Us</span></h1>
    </div>

    <div class="contact-container">
      <div class="contact-info">
        <h3>Get in Touch</h3>
        <p><i class="fas fa-envelope"></i> melatakalework@gmail.com</p>

        <div class="coming-soon">
          <p><i class="fas fa-clock"></i> Tour guide contact coming soon!</p>
        </div>
      </div>

      <div class="contact-form">
        <h3>Send a Message</h3>
        <form id="contactForm">
          <input
            type="text"
            id="contactName"
            placeholder="Your Name"
            required
          />
          <input
            type="email"
            id="contactEmail"
            placeholder="Your Email"
            required
          />
          <textarea
            id="contactMessage"
            placeholder="Your Message"
            rows="4"
            required
          ></textarea>
          <button type="submit" class="btn">
            <i class="fas fa-paper-plane"></i> Open Email App
          </button>
        </form>
        <p class="note">
          <i class="fas fa-info-circle"></i> Clicking the button will open your
          email app with the message pre-filled.
        </p>
      </div>
    </div>

    <footer>
      <p>© 2026 Discover Ethiopia. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
