<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Discover Ethiopia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">Discover <span>Ethiopia</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="destinations.html">Destinations</a>
            <a href="contact.html">Contact</a>
            <div id="authNav"></div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-circle auth-icon"></i>
                <h2>Welcome Back</h2>
                <p>Sign in to your Discover Ethiopia account</p>
            </div>

            <div id="authError" class="auth-error" style="display:none;"></div>
            <div id="authSuccess" class="auth-success" style="display:none;"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required autocomplete="email"/>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"/>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn auth-btn" id="submitBtn">
                    <span id="btnText">Sign In</span>
                    <span id="btnSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create one</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Discover Ethiopia. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        const API = 'https://discover-ethiopia-backend.onrender.com';

        // Redirect if already logged in
        if (getToken()) window.location.href = 'index.html';

        renderAuthNav(document.getElementById('authNav'));

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            hideMessages();
            setLoading(true);

            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message || 'Login failed');

                saveAuth(data.token, data.user);
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                    window.location.href = redirect;
                }, 800);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        });

        function setLoading(on) {
            document.getElementById('submitBtn').disabled = on;
            document.getElementById('btnText').style.display = on ? 'none' : 'inline';
            document.getElementById('btnSpinner').style.display = on ? 'inline' : 'none';
        }
        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function showSuccess(msg) {
            const el = document.getElementById('authSuccess');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideMessages() {
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authSuccess').style.display = 'none';
        }
    </script>
</body>
</html>
