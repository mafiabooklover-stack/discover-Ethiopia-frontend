<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Discover Ethiopia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">Discover <span>Ethiopia</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="destinations.html">Destinations</a>
            <a href="contact.html">Contact</a>
            <div id="authNav"></div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus auth-icon"></i>
                <h2>Create Account</h2>
                <p>Join Discover Ethiopia and start exploring</p>
            </div>

            <div id="authError" class="auth-error" style="display:none;"></div>
            <div id="authSuccess" class="auth-success" style="display:none;"></div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" placeholder="Your full name" required autocomplete="name"/>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required autocomplete="email"/>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6"/>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                    <div class="password-wrap">
                        <input type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password"/>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn auth-btn" id="submitBtn">
                    <span id="btnText">Create Account</span>
                    <span id="btnSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Discover Ethiopia. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        const API = 'https://discover-ethiopia-backend.onrender.com';

        // Redirect if already logged in
        if (getToken()) window.location.href = 'index.html';

        renderAuthNav(document.getElementById('authNav'));

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            hideMessages();

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message || 'Registration failed');

                saveAuth(data.token, data.user);
                showSuccess('Account created! Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 800);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        });

        function setLoading(on) {
            document.getElementById('submitBtn').disabled = on;
            document.getElementById('btnText').style.display = on ? 'none' : 'inline';
            document.getElementById('btnSpinner').style.display = on ? 'inline' : 'none';
        }
        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function showSuccess(msg) {
            const el = document.getElementById('authSuccess');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideMessages() {
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authSuccess').style.display = 'none';
        }
    </script>
</body>
</html>
